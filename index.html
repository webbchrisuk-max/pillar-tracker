<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pillar Tracker</title>

<style>

/* ===================== BASE ===================== */
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: #0a0a0a;
  color: #fff;
}

.container {
  padding: 16px;
}

/* ===================== HEADER ===================== */
h1 {
  text-align: center;
  color: #00f7ff;
  text-shadow: 0 0 10px #00f7ff;
}

/* ===================== CARD ===================== */
.card {
  background: #111;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 0 10px rgba(0,255,255,0.2);
}

/* ===================== TITLE ===================== */
.title {
  font-size: 18px;
  margin-bottom: 6px;
}

/* ===================== BAR ===================== */
.bar {
  width: 100%;
  height: 10px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}

.fill {
  height: 100%;
  background: #00f7ff;
}

/* ===================== STATUS ===================== */
.green { color: #00ff88; }
.amber { color: #ffcc00; }
.red { color: #ff4444; }

/* ===================== DECISION ===================== */
.decision {
  font-size: 20px;
  text-align: center;
  padding: 12px;
  border: 2px solid #00f7ff;
  border-radius: 12px;
  margin-bottom: 20px;
}

/* ===================== INPUT ===================== */
input {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: #fff;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #00f7ff;
  border: none;
  border-radius: 10px;
  color: #000;
  font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<h1>⚡ Pillar Tracker</h1>

<div class="decision" id="decisionBox">
Loading decision...
</div>

<!-- ===================== PILLARS ===================== -->

<div class="card">
<div class="title">M&G</div>
<div>£<span id="mngIncome">1138</span> / 2000</div>
<div class="bar"><div class="fill" id="mngBar"></div></div>
<div id="mngStatus"></div>
</div>

<div class="card">
<div class="title">Legal & General</div>
<div>£<span id="lngIncome">1691</span> / 2000</div>
<div class="bar"><div class="fill" id="lngBar"></div></div>
<div id="lngStatus"></div>
</div>

<div class="card">
<div class="title">Phoenix</div>
<div>£<span id="phnxIncome">910</span> / 2000</div>
<div class="bar"><div class="fill" id="phnxBar"></div></div>
<div id="phnxStatus"></div>
</div>

<div class="card">
<div class="title">SUPR</div>
<div>£<span id="suprIncome">784</span> / 2000</div>
<div class="bar"><div class="fill" id="suprBar"></div></div>
<div id="suprStatus"></div>
</div>

<!-- ===================== DIVIDEND LOG ===================== -->

<div class="card">
<h3>💰 Log Dividend</h3>
<input id="amount" placeholder="Amount £">
<select id="stock">
<option value="mng">M&G</option>
<option value="lng">L&G</option>
<option value="phnx">PHNX</option>
<option value="supr">SUPR</option>
</select>
<button onclick="addDividend()">Add</button>
</div>

</div>

<script>

/* ===================== DATA ===================== */

let target = 2000;

let data = {
  mng: 1138,
  lng: 1691,
  phnx: 910,
  supr: 784
};

/* ===================== UPDATE UI ===================== */

function update() {

  for (let key in data) {
    let percent = (data[key] / target) * 100;

    document.getElementById(key + "Bar").style.width = percent + "%";

    let status = "";
    if (percent < 60) status = "🟢 BUY";
    else if (percent < 90) status = "🟡 BUILD";
    else status = "🔴 PAUSE";

    document.getElementById(key + "Status").innerHTML = status;
  }

  // Decision logic
  let sorted = Object.entries(data).sort((a,b)=>a[1]-b[1]);

  let top = sorted[0][0];

  document.getElementById("decisionBox").innerHTML =
    "👉 BUY: " + top.toUpperCase();

}

/* ===================== ADD DIVIDEND ===================== */

function addDividend() {
  let amt = parseFloat(document.getElementById("amount").value);
  let stock = document.getElementById("stock").value;

  if (!amt) return;

  data[stock] += amt;

  document.getElementById(stock + "Income").innerText = Math.round(data[stock]);

  update();
}

/* ===================== INIT ===================== */

update();

</script>

</body>
</html>
