<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pillar Tracker</title>

<style>

/* ===================== BASE ===================== */
body {
  margin: 0;
  font-family: -apple-system, Arial;
  background: #0a0a0a;
  color: #fff;
}

.container {
  padding: 14px;
  max-width: 500px;
  margin: auto;
}

/* ===================== HEADER ===================== */
h1 {
  text-align: center;
  color: #00f7ff;
  text-shadow: 0 0 12px #00f7ff;
  margin-bottom: 20px;
}

/* ===================== DECISION ===================== */
.decision {
  text-align: center;
  padding: 14px;
  border-radius: 14px;
  border: 2px solid #00f7ff;
  margin-bottom: 20px;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 0 10px #00f7ff33;
}

/* ===================== CARD ===================== */
.card {
  background: #121212;
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 14px;
  box-shadow: 0 0 12px rgba(0,255,255,0.15);
}

/* ===================== TITLE ===================== */
.title {
  font-size: 16px;
  margin-bottom: 6px;
}

/* ===================== INPUT ===================== */
input {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #1e1e1e;
  color: #fff;
  text-align: center;
  font-size: 16px;
}

/* ===================== BAR ===================== */
.bar {
  width: 100%;
  height: 8px;
  background: #222;
  border-radius: 10px;
  margin-top: 8px;
  overflow: hidden;
}

.fill {
  height: 100%;
  background: #00f7ff;
  transition: 0.3s;
}

/* ===================== STATUS ===================== */
.status {
  margin-top: 6px;
  font-size: 14px;
}

.green { color: #00ff88; }
.amber { color: #ffcc00; }
.red { color: #ff4444; }

</style>
</head>

<body>

<div class="container">

<h1>⚡ Pillar Tracker</h1>

<div class="decision" id="decisionBox"></div>

<!-- ===================== PILLARS ===================== -->

<div class="card">
<div class="title">M&G (£)</div>
<input id="mng">
<div class="bar"><div class="fill" id="mngBar"></div></div>
<div class="status" id="mngStatus"></div>
</div>

<div class="card">
<div class="title">L&G (£)</div>
<input id="lng">
<div class="bar"><div class="fill" id="lngBar"></div></div>
<div class="status" id="lngStatus"></div>
</div>

<div class="card">
<div class="title">PHNX (£)</div>
<input id="phnx">
<div class="bar"><div class="fill" id="phnxBar"></div></div>
<div class="status" id="phnxStatus"></div>
</div>

<div class="card">
<div class="title">SUPR (£)</div>
<input id="supr">
<div class="bar"><div class="fill" id="suprBar"></div></div>
<div class="status" id="suprStatus"></div>
</div>

</div>

<script>

let target = 2000;

let data = JSON.parse(localStorage.getItem("pillarData")) || {
  mng: 1138,
  lng: 1691,
  phnx: 910,
  supr: 784
};

function save() {
  localStorage.setItem("pillarData", JSON.stringify(data));
}

function update() {

  let lowest = Object.entries(data).sort((a,b)=>a[1]-b[1])[0][0];

  document.getElementById("decisionBox").innerHTML =
    "👉 BUY: " + lowest.toUpperCase();

  for (let key in data) {

    document.getElementById(key).value = Math.round(data[key]);

    let percent = (data[key] / target) * 100;
    document.getElementById(key + "Bar").style.width = percent + "%";

    let el = document.getElementById(key + "Status");

    if (percent < 60) {
      el.innerHTML = "🟢 BUY";
      el.className = "status green";
    }
    else if (percent < 90) {
      el.innerHTML = "🟡 BUILD";
      el.className = "status amber";
    }
    else {
      el.innerHTML = "🔴 PAUSE";
      el.className = "status red";
    }

    document.getElementById(key).oninput = function() {
      data[key] = parseFloat(this.value) || 0;
      save();
      update();
    };
  }
}

update();

</script>

</body>
</html>
