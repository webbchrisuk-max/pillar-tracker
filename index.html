<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pillar Tracker</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: #fff;
}
.container { padding: 16px; }
h1 {
  text-align: center;
  color: #00f7ff;
  text-shadow: 0 0 10px #00f7ff;
}
.card {
  background: #111;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 0 10px rgba(0,255,255,0.2);
}
.bar {
  width: 100%;
  height: 10px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}
.fill {
  height: 100%;
  background: #00f7ff;
}
.decision {
  font-size: 20px;
  text-align: center;
  padding: 12px;
  border: 2px solid #00f7ff;
  border-radius: 12px;
  margin-bottom: 20px;
}
input {
  width: 100%;
  padding: 6px;
  margin-top: 5px;
  border-radius: 8px;
  border: none;
  background: #222;
  color: #fff;
  text-align: center;
}
</style>
</head>

<body>
<div class="container">

<h1>⚡ Pillar Tracker</h1>

<div class="decision" id="decisionBox"></div>

<!-- ===================== PILLARS ===================== -->

<div class="card">
M&G (£)
<input id="mng" type="number">
<div class="bar"><div class="fill" id="mngBar"></div></div>
<div id="mngStatus"></div>
</div>

<div class="card">
L&G (£)
<input id="lng" type="number">
<div class="bar"><div class="fill" id="lngBar"></div></div>
<div id="lngStatus"></div>
</div>

<div class="card">
PHNX (£)
<input id="phnx" type="number">
<div class="bar"><div class="fill" id="phnxBar"></div></div>
<div id="phnxStatus"></div>
</div>

<div class="card">
SUPR (£)
<input id="supr" type="number">
<div class="bar"><div class="fill" id="suprBar"></div></div>
<div id="suprStatus"></div>
</div>

</div>

<script>

let target = 2000;

let data = JSON.parse(localStorage.getItem("pillarData")) || {
  mng: 1138,
  lng: 1691,
  phnx: 910,
  supr: 784
};

function save() {
  localStorage.setItem("pillarData", JSON.stringify(data));
}

function update() {

  let lowest = Object.entries(data).sort((a,b)=>a[1]-b[1])[0][0];

  document.getElementById("decisionBox").innerHTML =
    "👉 BUY: " + lowest.toUpperCase();

  for (let key in data) {

    document.getElementById(key).value = Math.round(data[key]);

    let percent = (data[key] / target) * 100;

    document.getElementById(key + "Bar").style.width = percent + "%";

    let status = "";
    if (percent < 60) status = "🟢 BUY";
    else if (percent < 90) status = "🟡 BUILD";
    else status = "🔴 PAUSE";

    document.getElementById(key + "Status").innerHTML = status;

    document.getElementById(key).oninput = function() {
      data[key] = parseFloat(this.value) || 0;
      save();
      update();
    };
  }
}

update();

</script>

</body>
</html>
