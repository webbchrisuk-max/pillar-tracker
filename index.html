<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Pillar Tracker v1</title>

<style>
:root {
  --bg:#071018;
  --panel:rgba(15,27,43,.88);
  --line:rgba(101,225,255,.16);
  --cyan:#62f3ff;
  --green:#50ff8f;
  --amber:#ffc857;
  --red:#ff6b8a;
  --text:#e9f4ff;
  --muted:#96abc5;
}

body{
  margin:0;
  background:#071018;
  color:var(--text);
  font-family:system-ui;
  padding:14px;
}

.wrap{max-width:900px;margin:auto}

.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:16px;
  padding:14px;
  margin-top:12px;
}

h1{text-align:center;color:var(--cyan)}

.pillar{margin-top:12px}
.bar{
  height:12px;
  background:#222;
  border-radius:10px;
  overflow:hidden
}
.fill{
  height:100%;
  background:var(--cyan);
  width:0;
}

.signal{font-weight:bold;margin-top:6px}
.green{color:var(--green)}
.amber{color:var(--amber)}
.red{color:var(--red)}

.footer{
  margin-top:14px;
  text-align:center;
  color:var(--muted);
  font-size:12px;
}
</style>
</head>

<body>
<div class="wrap">

<h1>⚡ Pillar Tracker</h1>

<div class="card">
<div>Confirmed Annual Income</div>
<h2 id="total">£0</h2>
</div>

<!-- ===================== PILLARS ===================== -->

<div class="card pillar">
<div>Legal & General</div>
<div class="bar"><div class="fill"></div></div>
<div class="signal"></div>
</div>

<div class="card pillar">
<div>M&G</div>
<div class="bar"><div class="fill"></div></div>
<div class="signal"></div>
</div>

<div class="card pillar">
<div>Phoenix</div>
<div class="bar"><div class="fill"></div></div>
<div class="signal"></div>
</div>

<div class="card pillar">
<div>SUPR</div>
<div class="bar"><div class="fill"></div></div>
<div class="signal"></div>
</div>

<div class="footer">Update once per payday. Keep it simple.</div>

</div>

<!-- ===================== LOGIC (DO NOT TOUCH ABOVE) ===================== -->
<script>

let stageLevels = [2000,4000,6000,8000,10000,12000,14000,16000];

let data = JSON.parse(localStorage.getItem("pillarData")) || {
  lgen:1691,
  mng:1138,
  phnx:910,
  supr:784
};

function save(){
  localStorage.setItem("pillarData", JSON.stringify(data));
}

function getStage(val){
  for(let i=0;i<stageLevels.length;i++){
    if(val < stageLevels[i]) return stageLevels[i];
  }
  return stageLevels[stageLevels.length-1];
}

function update(){

  let total = Object.values(data).reduce((a,b)=>a+b,0);
  document.getElementById("total").innerText = "£"+Math.round(total);

  let keys = ["lgen","mng","phnx","supr"];
  let pillars = document.querySelectorAll(".pillar");

  pillars.forEach((p,i)=>{

    let key = keys[i];
    let value = data[key];
    let stage = getStage(value);
    let percent = (value / stage) * 100;

    // progress bar
    p.querySelector(".fill").style.width = percent+"%";

    // signal
    let signal = p.querySelector(".signal");

    if(percent < 60){
      signal.innerText = "🟢 BUY";
      signal.className = "signal green";
    }
    else if(percent < 90){
      signal.innerText = "🟡 BUILD";
      signal.className = "signal amber";
    }
    else{
      signal.innerText = "🔴 PAUSE";
      signal.className = "signal red";
    }

  });

}

update();

</script>

</body>
</html>
