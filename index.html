<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Pillar Tracker v1</title>

<style>
:root {
  --bg: #071018;
  --panel: rgba(15, 27, 43, 0.88);
  --line: rgba(101, 225, 255, 0.16);
  --cyan: #62f3ff;
  --green: #50ff8f;
  --amber: #ffc857;
  --red: #ff6b8a;
  --text: #e9f4ff;
  --muted: #96abc5;
}

body {
  margin: 0;
  background: #071018;
  color: var(--text);
  font-family: system-ui;
  padding: 18px;
}

.wrap { max-width: 900px; margin: auto; }

.card {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 16px;
  padding: 14px;
  margin-top: 14px;
}

h1 { text-align: center; color: var(--cyan); }

.bar {
  height: 14px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 8px;
}

.fill {
  height: 100%;
  background: linear-gradient(90deg,#1ad1ff,#62f3ff);
}

.signal {
  margin-top: 6px;
  font-weight: bold;
}

.green { color: var(--green); }
.amber { color: var(--amber); }
.red { color: var(--red); }

.footer {
  text-align: center;
  margin-top: 16px;
  color: var(--muted);
  font-size: 12px;
}
</style>
</head>

<body>

<div class="wrap">

<h1>⚡ Pillar Tracker</h1>

<div class="card">
<div>Confirmed Annual Income</div>
<h2>£4,613</h2>
</div>

<div class="card">
<div>Legal & General</div>
<div class="bar"><div class="fill" style="width:84%"></div></div>
<div class="signal amber">🟡 BUILD</div>
</div>

<div class="card">
<div>M&G</div>
<div class="bar"><div class="fill" style="width:57%"></div></div>
<div class="signal green">🟢 BUY</div>
</div>

<div class="card">
<div>Phoenix</div>
<div class="bar"><div class="fill" style="width:45%"></div></div>
<div class="signal green">🟢 BUY</div>
</div>

<div class="card">
<div>SUPR</div>
<div class="bar"><div class="fill" style="width:39%"></div></div>
<div class="signal green">🟢 BUY</div>
</div>

<div class="footer">
Update once per payday. Keep it simple.
</div>

</div>

</body>
</html>
